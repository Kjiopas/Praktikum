      <rect x="120" y="74" width="30" height="18" rx="9" fill="rgba(17,24,39,0.10)"/>
      <path d="M120 60c-22-22-48-22-70 0" fill="none" stroke="rgba(17,24,39,0.10)" stroke-width="14" stroke-linecap="round"/>
      <path d="M150 60c22-22 48-22 70 0" fill="none" stroke="rgba(17,24,39,0.10)" stroke-width="14" stroke-linecap="round"/>
    </g>

    <!-- hat -->
    <g transform="translate(420 132)" opacity="0.95">
